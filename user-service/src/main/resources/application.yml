server:
  port: 8080

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/user_service
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # Chữ "data" phải thụt lề ra ngoài, nằm thẳng hàng ngang với chữ "jpa" và "datasource"
  data:
    redis:
      host: localhost
      port: 6379

